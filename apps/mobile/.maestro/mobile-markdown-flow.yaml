# P7 mobile 24차 — Markdown preview GFM + 편집 토글
appId: dev.cursor.remote
---
- launchApp
- assertVisible: "Cursor Remote Dev"
- tapOn:
    id: "home-tab-projects"
    optional: true
- extendedWaitUntil:
    visible: "maestro-e2e"
    timeout: 45000
- tapOn: "maestro-e2e"
- tapOn:
    id: "project-nav-files"
- extendedWaitUntil:
    visible: "README.md"
    timeout: 30000
- tapOn: "README.md"
- tapOn: "미리보기"
- extendedWaitUntil:
    visible:
      id: "markdown-preview"
    timeout: 30000
- assertVisible: "Maestro preview"
- assertVisible: "todo item"
- assertVisible: "GFM footnote body"
- tapOn:
    id: "footnote-ref-note"
- assertVisible:
    id: "footnote-note"
- tapOn: "편집"
- assertVisible: "Maestro preview"
