# P7 mobile 28차 — suite session inbox git deeplink
appId: dev.cursor.remote
---
- tapOn:
    id: "home-tab-inbox"
- extendedWaitUntil:
    visible: "Maestro Git"
    timeout: 45000
- tapOn: "Maestro Git"
- assertVisible: "Git 상태"
