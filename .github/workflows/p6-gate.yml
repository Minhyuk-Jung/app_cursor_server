# 21-test-strategy P6 게이트 — SEC-04 + S17 E2E + docker sandbox (통합)
name: P6 Gate

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  docker-sandbox:
    name: Docker sandbox (SEC-04 / NFR-13)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared
        run: npm run build -w @app/shared

      - name: Generate Prisma client
        working-directory: apps/server
        run: npx prisma generate

      - name: Build sandbox-sdk image (ADR-007 POC 3)
        run: docker build -t cursor-sandbox-sdk:ci apps/server/docker/sandbox-sdk

      - name: Docker sandbox tests
        working-directory: apps/server
        env:
          SANDBOX_DOCKER_IMAGE: cursor-sandbox-sdk:ci
        run: |
          npx vitest run \
            src/services/exec/docker-sandbox-manager.test.ts \
            src/services/exec/p6-docker.integration.test.ts \
            src/core/sdk/container-sdk-bridge.test.ts \
            src/core/sdk/container-sdk-bridge.docker.test.ts \
            src/core/session/session-manager.shared-runtime.docker.test.ts \
            src/services/exec/sandbox-errors.test.ts \
            src/services/exec/exec-service.test.ts \
            src/services/exec/exec-resource-limit.test.ts \
            src/services/exec/preview-registry.test.ts \
            src/services/exec/terminal-connection-registry.test.ts \
            src/config.sandbox.test.ts

  s17-api-e2e:
    name: S17 API E2E (UR-09·UR-10)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared
        run: npm run build -w @app/shared

      - name: Generate Prisma client
        working-directory: apps/server
        run: npx prisma generate

      - name: P6 API E2E smoke
        run: npx playwright test -c e2e/playwright.api.config.ts e2e/p6-scenarios.spec.ts
        env:
          CI: "1"

  s17-ui-e2e:
    name: S17 UI E2E (15+13)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared
        run: npm run build -w @app/shared

      - name: Generate Prisma client
        working-directory: apps/server
        run: npx prisma generate

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: TerminalPanel UI E2E
        run: npx playwright test -c e2e/playwright.ui.config.ts e2e/p6-ui-scenarios.spec.ts
        env:
          CI: "1"

  s17-api-docker-e2e:
    name: S17 API E2E (docker sandbox)
    runs-on: ubuntu-latest
