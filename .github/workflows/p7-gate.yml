# 21-test-strategy P7 게이트 — UR-15·UR-16·SEC-03
name: P7 Gate

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  p7-integration:
    name: P7 integration (UR-15/16)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared
        run: npm run build -w @app/shared

      - name: Generate Prisma client
        working-directory: apps/server
        run: npx prisma generate

      - name: P7 server integration tests
        working-directory: apps/server
        run: |
          npx vitest run --no-file-parallelism \
            src/api/channel-source.test.ts \
            src/api/expo-push.integration.test.ts \
            src/api/expo-push-send.integration.test.ts \
            src/services/push/expo-push.test.ts \
            src/api/attachments-multipart.integration.test.ts \
            src/api/e2e-session-seed.integration.test.ts \
            src/api/maestro-inbox-seed.integration.test.ts \
            src/api/messages-pagination.integration.test.ts \
            src/api/stt-routes.integration.test.ts \
            src/api/attachments-send.integration.test.ts \
            src/api/webhook-signature.integration.test.ts \
            src/adapters/telegram/telegram-s30.integration.test.ts \
            src/adapters/intranet/intranet-s31-outbound.integration.test.ts \
            src/core/session/session-summary.test.ts \
            src/core/session/session-summary.integration.test.ts \
            src/core/session/session-manager.summary.test.ts

  p7-s19-ui-e2e:
    name: S19 session summary UI E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared
        run: npm run build -w @app/shared

      - name: Generate Prisma client
        working-directory: apps/server
        run: npx prisma generate

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: S19 session summary UI E2E
        run: npm run test:e2e:s19
        env:
          CI: "1"

